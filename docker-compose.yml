version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-supersecret-change-in-prod}
      - DB_PATH=/data/renote.db
      - CHROMA_PATH=/data/chroma_store
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
